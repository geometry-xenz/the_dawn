# ==============================================================================
# Workflow: Retrieve Learning Entry
# Trigger:  Manual  (Actions -> Retrieve Learning Entry -> Run workflow)
# What it does:
#   - Finds the Markdown log for a given user + date
#   - Prints it directly in the Actions run log with ANSI colours
#   - No artifacts, no downloads — just open the run and read
# ==============================================================================

name: "Retrieve Learning Entry"

on:
  workflow_dispatch:
    inputs:

      user:
        description: "Your name"
        required: true
        type: string

      log_date:
        description: "Date to retrieve (leave blank = today)  format: YYYY-MM-DD"
        required: false
        type: string
        default: ""

jobs:
  retrieve:
    name: "Retrieve entry for ${{ inputs.user }}"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # ── 2. Resolve date ────────────────────────────────────────────────────
      - name: "Resolve target date"
        id: date
        run: |
          if [ -n "${{ inputs.log_date }}" ]; then
            RAW="${{ inputs.log_date }}"
          else
            RAW=$(date -u '+%Y-%m-%d')
          fi

          DAY=$(date  -d "$RAW" '+%d')
          MONTH=$(date -d "$RAW" '+%B')
          YEAR=$(date  -d "$RAW" '+%Y')

          echo "day=$DAY"     >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "year=$YEAR"   >> "$GITHUB_OUTPUT"

      # ── 3. Find & display the entry in the run log ─────────────────────────
      - name: "Display learning entry"
        run: |
          python3 - <<'EOF'
          import os, pathlib, sys

          # ANSI codes — GitHub Actions log renders these
          RESET  = "\033[0m"
          BOLD   = "\033[1m"
          DIM    = "\033[2m"
          CYAN   = "\033[36m"
          YELLOW = "\033[33m"
          GREEN  = "\033[32m"
          RED    = "\033[31m"
          WHITE  = "\033[37m"

          def banner():
              lines = [
                  "  ██████╗  █████╗ ██╗    ██╗███╗   ██╗",
                  "  ██╔══██╗██╔══██╗██║    ██║████╗  ██║",
                  "  ██║  ██║███████║██║ █╗ ██║██╔██╗ ██║",
                  "  ██║  ██║██╔══██║██║███╗██║██║╚██╗██║",
                  "  ██████╔╝██║  ██║╚███╔███╔╝██║ ╚████║",
                  "  ╚═════╝ ╚═╝  ╚═╝ ╚══╝╚══╝ ╚═╝  ╚═══╝",
                  "       Daily Learning Logger",
              ]
              print(f"\n{BOLD}{CYAN}{'─'*50}{RESET}")
              for l in lines:
                  print(f"{BOLD}{CYAN}{l}{RESET}")
              print(f"{BOLD}{CYAN}{'─'*50}{RESET}\n")

          def section(title):
              pad = max(0, 40 - len(title))
              print(f"\n{BOLD}{CYAN}┌{'─'*42}┐{RESET}")
              print(f"{BOLD}{CYAN}│  {YELLOW}{title}{' ' * pad}{CYAN}  │{RESET}")
              print(f"{BOLD}{CYAN}└{'─'*42}┘{RESET}\n")

          banner()

          name  = os.environ["USER_NAME"]
          day   = os.environ["DAY"]
          month = os.environ["MONTH"]
          year  = os.environ["YEAR"]

          md_path = pathlib.Path(month) / day / f"{name.lower()}_learning.md"

          section(f"{name.upper()}  -  {day} {month} {year}")

          if not md_path.exists():
              print(f"  {RED}No entry found for {name.upper()} on {day} {month} {year}.{RESET}")
              print(f"  {DIM}Expected file: {md_path}{RESET}\n")
              sys.exit(0)

          # Pretty-print the Markdown with colours
          print(f"  {GREEN}Found: {md_path}{RESET}\n")
          print(f"{BOLD}{CYAN}{'─'*50}{RESET}")

          for line in md_path.read_text().splitlines():
              if line.startswith("# "):
                  print(f"\n  {BOLD}{YELLOW}{line}{RESET}")
              elif line.startswith("## "):
                  print(f"\n  {BOLD}{CYAN}{line}{RESET}")
              elif line.startswith("### "):
                  print(f"  {DIM}{WHITE}{line}{RESET}")
              elif line.startswith("- "):
                  print(f"  {GREEN}>{WHITE} {line[2:]}{RESET}")
              elif line.strip():
                  print(f"  {WHITE}{line}{RESET}")
              else:
                  print()

          print(f"\n{BOLD}{CYAN}{'─'*50}{RESET}\n")
          EOF
        env:
          USER_NAME: "${{ inputs.user }}"
          DAY:       "${{ steps.date.outputs.day }}"
          MONTH:     "${{ steps.date.outputs.month }}"
          YEAR:      "${{ steps.date.outputs.year }}"