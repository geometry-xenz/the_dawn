# ==============================================================================
# Workflow: Retrieve Learning Entry
# Trigger:  Manual  (Actions вҶ’ Retrieve Learning Entry вҶ’ Run workflow)
# What it does:
#   - Finds the Markdown log for a given user + date
#   - Prints it in the Actions run log  (with ANSI colours where supported)
#   - Also uploads it as a downloadable workflow artifact
# ==============================================================================

name: "рҹ”Қ Retrieve Learning Entry"

on:
  workflow_dispatch:
    inputs:

      user:
        description: "рҹ‘Ө Your name"
        required: true
        type: string

      log_date:
        description: "рҹ“… Date to retrieve  (leave blank = today)  format: YYYY-MM-DD"
        required: false
        type: string
        default: ""

jobs:
  retrieve:
    name: "Retrieve entry for ${{ inputs.user }}"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # в”Җв”Җ 1. Checkout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "рҹ”Җ Checkout repository"
        uses: actions/checkout@v4

      # в”Җв”Җ 2. Resolve date в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "рҹ“… Resolve target date"
        id: date
        run: |
          if [ -n "${{ inputs.log_date }}" ]; then
            RAW="${{ inputs.log_date }}"
          else
            RAW=$(date -u '+%Y-%m-%d')
          fi

          DAY=$(date  -d "$RAW" '+%d')
          MONTH=$(date -d "$RAW" '+%B')
          YEAR=$(date  -d "$RAW" '+%Y')

          echo "day=$DAY"     >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "year=$YEAR"   >> "$GITHUB_OUTPUT"

      # в”Җв”Җ 3. Find & display the entry в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "рҹ“– Display learning entry"
        id: display
        run: |
          python3 - <<'EOF'
          import os, pathlib, sys

          # в”Җв”Җ ANSI helpers (GitHub Actions log supports basic ANSI) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          RESET   = "\033[0m"
          BOLD    = "\033[1m"
          CYAN    = "\033[36m"
          YELLOW  = "\033[33m"
          GREEN   = "\033[32m"
          RED     = "\033[31m"
          WHITE   = "\033[37m"
          DIM     = "\033[2m"

          def banner():
            lines = [
              "  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—",
              "  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘",
              "  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘",
              "  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘",
              "  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘",
              "  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ",
              "       Daily Learning Logger вҖ” Retrieve",
            ]
            print(f"\n{BOLD}{CYAN}{'в”Җ'*48}{RESET}")
            for l in lines:
              print(f"{BOLD}{CYAN}{l}{RESET}")
            print(f"{BOLD}{CYAN}{'в”Җ'*48}{RESET}\n")

          def section(title):
            print(f"\n{BOLD}{CYAN}в”Ң{'в”Җ'*40}в”җ{RESET}")
            print(f"{BOLD}{CYAN}в”Ӯ  {YELLOW}{title:<38}{CYAN}в”Ӯ{RESET}")
            print(f"{BOLD}{CYAN}в””{'в”Җ'*40}в”ҳ{RESET}\n")

          banner()

          name  = os.environ["USER_NAME"]
          day   = os.environ["DAY"]
          month = os.environ["MONTH"]
          year  = os.environ["YEAR"]

          md_path = pathlib.Path(month) / day / f"{name.lower()}_learning.md"

          section(f"{name.upper()}  В·  {day} {month} {year}")

          if not md_path.exists():
            print(f"  {RED}вңҳ  No entry found for {name.upper()} on {day} {month} {year}.{RESET}")
            print(f"  {DIM}   Expected path: {md_path}{RESET}\n")
            # Exit 0 so the job stays green вҖ” just "not found", not an error
            sys.exit(0)

          # в”Җв”Җ Pretty-print the Markdown в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          print(f"  {GREEN}вң”  Found: {md_path}{RESET}\n")
          print(f"{BOLD}{CYAN}{'в”Җ'*48}{RESET}")

          for line in md_path.read_text().splitlines():
            if line.startswith("# "):
              print(f"\n  {BOLD}{YELLOW}{line}{RESET}")
            elif line.startswith("## "):
              print(f"\n  {BOLD}{CYAN}{line}{RESET}")
            elif line.startswith("### "):
              print(f"  {DIM}{WHITE}{line}{RESET}")
            elif line.startswith("- "):
              print(f"  {GREEN}в–ё{WHITE} {line[2:]}{RESET}")
            elif line.strip():
              print(f"  {WHITE}{line}{RESET}")
            else:
              print()

          print(f"\n{BOLD}{CYAN}{'в”Җ'*48}{RESET}\n")

          # Write path to env so the upload step knows where the file is
          with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write(f"MD_PATH={md_path}\n")
            f.write(f"ENTRY_FOUND=true\n")
          EOF
        env:
          USER_NAME: "${{ inputs.user }}"
          DAY:       "${{ steps.date.outputs.day }}"
          MONTH:     "${{ steps.date.outputs.month }}"
          YEAR:      "${{ steps.date.outputs.year }}"

      # в”Җв”Җ 4. Upload Markdown as downloadable artifact в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "рҹ“Һ Upload entry as artifact"
        if: env.ENTRY_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.user }}-${{ steps.date.outputs.day }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.year }}"
          path: "${{ env.MD_PATH }}"
          retention-days: 30
